name: Pravaha CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DB_NAME: pravaha_test
  JWT_SECRET: test-secret-key-for-ci-only
  REDIS_URL: redis://localhost:6379
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OLLAMA_HOST: http://localhost:11434
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  BHASHINI_USER_ID: ${{ secrets.BHASHINI_USER_ID }}
  BHASHINI_API_KEY: ${{ secrets.BHASHINI_API_KEY }}
  BHASHINI_PIPELINE_ID: ${{ secrets.BHASHINI_PIPELINE_ID }}
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          cd backend
          ruff check .

      - name: Run structural invariant tests
        run: |
          cd backend
          pytest tests/structural/ -v --tb=short

      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration/ -v --tb=short
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Lint
        run: |
          cd web
          npm run lint

      - name: Type check
        run: |
          cd web
          npx tsc --noEmit

      - name: Build
        run: |
          cd web
          npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1

  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Run tests
        run: |
          cd mobile
          npx jest --ci --coverage

  token-generation:
    name: Token Generation Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run token generation
        run: node scripts/generate-tokens.js

      - name: Check no unstaged changes
        run: |
          git diff --exit-code web/app/globals.css || (echo "ERROR: globals.css is out of sync with design-tokens.json" && exit 1)
          git diff --exit-code mobile/tailwind.config.js || (echo "ERROR: tailwind.config.js is out of sync with design-tokens.json" && exit 1)
